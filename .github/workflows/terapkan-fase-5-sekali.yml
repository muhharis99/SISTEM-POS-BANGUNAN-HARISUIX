name: Terapkan Fase 5 Sekali

on:
  push:
    branches:
      - fase-5-pembelian-hutang
    paths:
      - '.github/workflows/terapkan-fase-5-sekali.yml'
      - '.fase5-paket/**'

permissions:
  contents: write

concurrency:
  group: terapkan-fase-5-sekali
  cancel-in-progress: false

jobs:
  terapkan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch Fase 5
        uses: actions/checkout@v4
        with:
          ref: fase-5-pembelian-hutang
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none

      - name: Decode dan verifikasi paket
        run: |
          set -euo pipefail
          cat .fase5-paket/part-* | base64 --decode > /tmp/fase5-package.tar.gz
          test -s /tmp/fase5-package.tar.gz
          gzip -t /tmp/fase5-package.tar.gz
          echo '8da42a2aecb347ce61b7e5ff101e1a380665025bc23161048ffe91e03d17a3c4  /tmp/fase5-package.tar.gz' | sha256sum --check
          tar -tzf /tmp/fase5-package.tar.gz | tee /tmp/fase5-package-files.txt

          if grep -E '(^|/)\.\.(/|$)|^/' /tmp/fase5-package-files.txt; then
            echo 'Paket mengandung path absolut atau parent traversal.' >&2
            exit 1
          fi

          if grep -E '(^|/)(struktur_database_toko_bangunan\.sql|database/migrations/|vendor/|\.git/|\.github/workflows/)' /tmp/fase5-package-files.txt; then
            echo 'Paket mencoba mengubah berkas yang dilarang.' >&2
            exit 1
          fi

      - name: Ekstrak implementasi ke branch Fase 5
        run: tar -xzf /tmp/fase5-package.tar.gz -C .

      - name: Periksa sintaks PHP
        run: find app bootstrap config database routes scripts tests resources/views -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Buat commit implementasi
        run: |
          set -euo pipefail
          rm -rf .fase5-paket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          if git diff --cached --quiet; then
            echo 'Tidak ada perubahan implementasi Fase 5.' >&2
            exit 1
          fi
          git commit -m "feat(fase5): implementasi pembelian dan hutang pemasok"
          git push origin HEAD:fase-5-pembelian-hutang
