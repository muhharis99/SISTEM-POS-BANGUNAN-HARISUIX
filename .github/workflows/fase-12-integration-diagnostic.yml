name: Fase 12 Integration Diagnostic

on:
  push:
    branches:
      - fase-12-final-release-go-live-hypercare
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sistem_informasi_toko_bangunan
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql, zlib
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Prepare database and permissions
        run: |
          cp .env.example .env
          php artisan key:generate
          php scripts/salin-aset-template.php
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=sistem_informasi_toko_bangunan/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env
          php artisan migrate --force
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u root -proot sistem_informasi_toko_bangunan -e "INSERT INTO cabang (kode_cabang,nama_cabang,alamat,status_aktif) VALUES ('CAB-UJI','Cabang Pengujian','Alamat Pengujian',1);"
          php artisan fase2:siapkan --nama-pengguna=admin_fase12 --kata-sandi='AdminFase12!2026' --nama-tampilan='Administrator Fase 12'
          php artisan fase3:siapkan
          php artisan fase4:siapkan
          php artisan fase5:siapkan
          php artisan fase6:siapkan
          php artisan fase7:siapkan
          php artisan fase8:siapkan
          php artisan fase9:siapkan
      - name: Run diagnostic integration test
        env:
          FASE12_INTEGRATION: true
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          set -o pipefail
          php artisan test --filter=FaseDuaBelasFinalReleaseTest 2>&1 | tee fase12-integration.log
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fase-12-integration-log
          path: fase12-integration.log
          retention-days: 2
          if-no-files-found: warn
