name: Diagnostik Pint Fase 13

on:
  push:
    branches:
      - fase-13-operasional-pascapeluncuran

permissions:
  contents: read

jobs:
  diagnostik-pint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Capture Pint diagnostics
        id: pint
        continue-on-error: true
        run: vendor/bin/pint --test --format=json > pint-fase-13.json
      - name: Upload Pint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pint-fase-13
          path: pint-fase-13.json
          retention-days: 2
      - name: Fail when Pint fails
        if: steps.pint.outcome == 'failure'
        run: exit 1
