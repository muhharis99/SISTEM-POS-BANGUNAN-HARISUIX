name: Diagnostik Pint Fase 13

on:
  push:
    branches:
      - fase-13-operasional-pascapeluncuran
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostik-pint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Format Phase 13 files with Pint
        run: |
          vendor/bin/pint \
            tests/Feature/FaseTigaBelasFinalisasiKekuranganTest.php \
            app/Services/LayananKeuanganFinal.php \
            app/Providers/AppServiceProvider.php \
            app/Console/Commands/SiapkanAkuntansiReturFaseTigaBelas.php \
            app/Http/Requests/Penjualan/SimpanPenjualanFinalRequest.php \
            app/Http/Requests/Penjualan/SimpanPesananFinalRequest.php \
            app/Http/Requests/Penjualan/SimpanPenawaranFinalRequest.php \
            app/Http/Requests/Penjualan/SimpanReturPenjualanDiperkuatRequest.php \
            app/Http/Controllers/InputPenjualanFinalController.php \
            app/Http/Controllers/PenjualanFinalController.php \
            routes/fase13.php
      - name: Verify Pint after formatting
        run: vendor/bin/pint --test
      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: file-terformat-pint-fase-13
          path: |
            tests/Feature/FaseTigaBelasFinalisasiKekuranganTest.php
            app/Services/LayananKeuanganFinal.php
            app/Providers/AppServiceProvider.php
            app/Console/Commands/SiapkanAkuntansiReturFaseTigaBelas.php
            app/Http/Requests/Penjualan/SimpanPenjualanFinalRequest.php
            app/Http/Requests/Penjualan/SimpanPesananFinalRequest.php
            app/Http/Requests/Penjualan/SimpanPenawaranFinalRequest.php
            app/Http/Requests/Penjualan/SimpanReturPenjualanDiperkuatRequest.php
            app/Http/Controllers/InputPenjualanFinalController.php
            app/Http/Controllers/PenjualanFinalController.php
            routes/fase13.php
          retention-days: 2
          if-no-files-found: error
