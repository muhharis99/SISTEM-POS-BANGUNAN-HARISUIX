name: Fase 13 Operasional Pascapeluncuran Test

on:
  push:
    branches:
      - fase-13-operasional-pascapeluncuran
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-fase-13:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sistem_informasi_toko_bangunan
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql, zlib
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate
          php scripts/salin-aset-template.php
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=sistem_informasi_toko_bangunan/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env

      - name: Validate issue forms and support configuration
        run: ruby scripts/verifikasi-issue-form.rb

      - name: Verify Phase 13 documentation and governance
        run: |
          test -s SECURITY.md
          test -s SUPPORT.md
          test -s .github/pull_request_template.md
          test -s docs/FASE-13-STATUS.md
          test -s docs/FASE-13-RINGKASAN-IMPLEMENTASI.md
          test -s docs/FASE-13-CHECKLIST-PENGUJIAN-MANUAL.md
          test -s docs/OPERASIONAL-PASCAPELUNCURAN.md
          test -s docs/SLA-DAN-DUKUNGAN.md
          test -s docs/RELEASE-DAN-DEPLOYMENT-PRODUKSI.md
          test -s .github/workflows/release-produksi.yml
          grep -q 'P0' docs/SLA-DAN-DUKUNGAN.md
          grep -q 'Auto-merge' docs/FASE-13-STATUS.md
          grep -q '71 base table' docs/FASE-13-STATUS.md
          grep -q '98 permission' docs/FASE-13-STATUS.md
          grep -q 'Report a vulnerability' SECURITY.md
          grep -q 'Expected head SHA' .github/pull_request_template.md

      - name: Check Ruby syntax
        run: ruby -c scripts/verifikasi-issue-form.rb

      - name: Check PHP syntax and formatting
        run: |
          find app bootstrap config database routes scripts tests -name '*.php' -print0 | xargs -0 -n1 php -l
          vendor/bin/pint --test

      - name: Backup empty database before migration
        run: mysqldump --protocol=TCP -h 127.0.0.1 -P 3306 -u root -proot --databases sistem_informasi_toko_bangunan > backup-sebelum-migrasi-fase-13.sql

      - name: Run patent schema migration
        run: php artisan migrate --force

      - name: Add explicit branch data
        run: |
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u root -proot sistem_informasi_toko_bangunan <<'SQL'
          INSERT INTO cabang (kode_cabang, nama_cabang, alamat, status_aktif)
          VALUES ('CAB-UJI', 'Cabang Pengujian', 'Alamat Pengujian', 1);
          SQL

      - name: Prepare administrator and phase data
        run: |
          php artisan fase2:siapkan --nama-pengguna=admin_fase13 --kata-sandi='AdminFase13!2026' --nama-tampilan='Administrator Fase 13'
          php artisan fase3:siapkan
          php artisan fase4:siapkan
          php artisan fase5:siapkan
          php artisan fase6:siapkan
          php artisan fase7:siapkan
          php artisan fase8:siapkan
          php artisan fase9:siapkan
          php artisan fase13:siapkan-akuntansi-retur

      - name: Assert patent schema and unchanged access
        run: |
          test "$(mysql --protocol=TCP -N -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT COUNT(*) FROM information_schema.TABLES WHERE TABLE_SCHEMA='sistem_informasi_toko_bangunan' AND TABLE_TYPE='BASE TABLE';")" = "71"
          test "$(mysql --protocol=TCP -N -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT COUNT(*) FROM information_schema.TABLES WHERE TABLE_SCHEMA='sistem_informasi_toko_bangunan' AND TABLE_TYPE='VIEW';")" = "3"
          test "$(mysql --protocol=TCP -N -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT COUNT(*) FROM information_schema.TABLES WHERE TABLE_SCHEMA='sistem_informasi_toko_bangunan' AND TABLE_NAME IN ('sessions','cache','jobs','job_batches','failed_jobs','password_reset_tokens');")" = "0"
          test "$(mysql --protocol=TCP -N -h 127.0.0.1 -P 3306 -u root -proot sistem_informasi_toko_bangunan -e "SELECT COUNT(*) FROM hak_akses WHERE deleted_at IS NULL;")" = "98"
          test "$(mysql --protocol=TCP -N -h 127.0.0.1 -P 3306 -u root -proot sistem_informasi_toko_bangunan -e "SELECT COUNT(*) FROM akun_keuangan WHERE kode_akun='410110' AND nama_akun='Retur dan Potongan Penjualan' AND saldo_normal='DEBET' AND deleted_at IS NULL;")" = "1"
          test "$(mysql --protocol=TCP -N -h 127.0.0.1 -P 3306 -u root -proot sistem_informasi_toko_bangunan -e "SELECT COUNT(*) FROM pemetaan_akun WHERE id_cabang IS NULL AND kunci_pemetaan='RETUR_PENJUALAN';")" = "1"
          test "$(cat VERSION)" = "v1.0.0"
          php artisan skema:verifikasi --rinci

      - name: Run Phase 13 sales hardening tests
        env:
          FASE13_INTEGRATION: true
        run: |
          php artisan test --filter=FaseTigaBelasHardeningPenjualanTest
          php artisan test --filter=FaseTigaBelasFinalisasiKekuranganTest

      - name: Run Phase 12 regression
        env:
          FASE12_INTEGRATION: true
          RELEASE_COMMIT: ${{ github.sha }}
        run: php artisan test --filter=FaseDuaBelasFinalReleaseTest

      - name: Run complete regression suite
        run: php artisan test
