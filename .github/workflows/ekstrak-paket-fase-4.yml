name: Ekstrak Paket Fase 4

on:
  push:
    branches:
      - fase-4-persediaan
    paths:
      - '.github/workflows/ekstrak-paket-fase-4.yml'
      - '.fase4-paket/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/ekstrak-paket-fase-4.yml'
      - '.fase4-paket/**'

permissions:
  contents: write

concurrency:
  group: terapkan-paket-fase-4
  cancel-in-progress: true

jobs:
  ekstrak:
    if: github.event_name == 'pull_request' && github.head_ref == 'fase-4-persediaan'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch Fase 4
        uses: actions/checkout@v4
        with:
          ref: fase-4-persediaan
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none

      - name: Decode dan audit paket
        run: |
          set -euo pipefail
          cat .fase4-paket/part-* | base64 --decode > /tmp/fase4-package.tar.gz
          test -s /tmp/fase4-package.tar.gz
          gzip -t /tmp/fase4-package.tar.gz
          tar -tzf /tmp/fase4-package.tar.gz > /tmp/fase4-package-files.txt
          cat /tmp/fase4-package-files.txt

          if grep -E '(^|/)\.\.(/|$)|^/' /tmp/fase4-package-files.txt; then
            echo 'Paket mengandung path absolut atau parent traversal.' >&2
            exit 1
          fi

          if grep -E '(^|/)(struktur_database_toko_bangunan\.sql|database/migrations/|vendor/|\.git/)' /tmp/fase4-package-files.txt; then
            echo 'Paket mencoba mengubah berkas yang dilarang.' >&2
            exit 1
          fi

      - name: Ekstrak paket
        run: tar -xzf /tmp/fase4-package.tar.gz -C .

      - name: Terapkan koreksi integritas transaksi
        run: |
          python3 <<'PY'
          from pathlib import Path

          transfer = Path('app/Http/Controllers/TransferStokController.php')
          text = transfer.read_text()
          old = """                $barangSatuan = $persediaan->barangSatuan((int) $baris->id_barang_satuan);
                          $jumlahDikirim = (float) $baris->jumlah_diminta;
                          $jumlahDasar = $persediaan->jumlahDasar($barangSatuan, $jumlahDikirim, 'jumlah_dikirim');
                          $saldo = $persediaan->saldoTerkunci((int) $dokumen->id_gudang_asal, (int) $baris->id_lokasi_asal, (int) $barangSatuan->id_barang);
          """
          new = """                $barangSatuan = $persediaan->barangSatuan((int) $baris->id_barang_satuan);
                          $jumlahDikirim = (float) $baris->jumlah_diminta;
                          $persediaan->pastikanDesimal($jumlahDikirim, (int) $barangSatuan->jumlah_desimal, 'jumlah_dikirim');

                          $nilaiKonversi = (float) $baris->nilai_konversi;
                          if ($nilaiKonversi <= 0) {
                              throw ValidationException::withMessages([
                                  'detail_transfer' => 'Nilai konversi transfer tidak valid. Perbarui draf transfer sebelum dikirim.',
                              ]);
                          }

                          // Gunakan nilai konversi yang dibekukan pada detail dokumen agar
                          // perubahan master satuan tidak mengubah arti transaksi historis.
                          $jumlahDasar = round($jumlahDikirim * $nilaiKonversi, 3);
                          if ($jumlahDasar <= 0) {
                              throw ValidationException::withMessages([
                                  'jumlah_dikirim' => 'Hasil konversi ke satuan dasar harus lebih besar dari nol.',
                              ]);
                          }

                          $saldo = $persediaan->saldoTerkunci((int) $dokumen->id_gudang_asal, (int) $baris->id_lokasi_asal, (int) $barangSatuan->id_barang);
          """
          if old not in text:
              raise SystemExit('Blok transfer yang akan dikoreksi tidak ditemukan.')
          transfer.write_text(text.replace(old, new, 1))

          opname = Path('app/Http/Controllers/StokOpnameController.php')
          text = opname.read_text()
          old = """            foreach ($detail as $baris) {
                          $selisih = round((float) $baris->jumlah_selisih, 3);
          """
          new = """            foreach ($detail as $baris) {
                          $saldoSaatIni = $persediaan->saldoTerkunci(
                              (int) $dokumen->id_gudang,
                              (int) $baris->id_lokasi_gudang,
                              (int) $baris->id_barang,
                          );
                          if (abs((float) $saldoSaatIni->jumlah_stok - (float) $baris->jumlah_sistem) > 0.0001) {
                              throw ValidationException::withMessages([
                                  'detail_opname' => 'Saldo stok berubah setelah opname dimulai. Batalkan dan ulangi opname agar penyesuaian tidak memakai saldo yang sudah kedaluwarsa.',
                              ]);
                          }

                          $selisih = round((float) $baris->jumlah_selisih, 3);
          """
          if old not in text:
              raise SystemExit('Blok persetujuan opname yang akan dikoreksi tidak ditemukan.')
          text = text.replace(old, new, 1)
          old = """            $lot = blank($baris['nomor_lot'] ?? null) ? null : trim((string) $baris['nomor_lot']);
                          $kunci = $this->kunci((int) $baris['id_barang'], (int) $baris['id_lokasi_gudang'], $lot);
                          if (isset($dipakai[$kunci])) {
                              throw ValidationException::withMessages([\"detail_opname.{$index}.id_barang\" => 'Kombinasi barang, lokasi, dan nomor lot tidak boleh duplikat.']);
                          }
                          $dipakai[$kunci] = true;
          """
          new = """            $lot = blank($baris['nomor_lot'] ?? null) ? null : trim((string) $baris['nomor_lot']);
                          $kunciSaldo = (int) $baris['id_barang'].'|'.(int) $baris['id_lokasi_gudang'];
                          if (isset($dipakai[$kunciSaldo])) {
                              throw ValidationException::withMessages([
                                  \"detail_opname.{$index}.id_barang\" => 'Barang dan lokasi yang sama hanya boleh dicatat sekali karena saldo stok tidak dipisahkan per nomor lot.',
                              ]);
                          }
                          $dipakai[$kunciSaldo] = true;
                          $kunci = $this->kunci((int) $baris['id_barang'], (int) $baris['id_lokasi_gudang'], $lot);
          """
          if old not in text:
              raise SystemExit('Blok duplikasi opname yang akan dikoreksi tidak ditemukan.')
          opname.write_text(text.replace(old, new, 1))
          PY

          cp /tmp/fase4-package-files.txt /tmp/fase4-package-files-final.txt

      - name: Periksa sintaks PHP
        run: find app bootstrap config database routes scripts tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Siapkan commit bersih
        run: |
          set -euo pipefail
          rm -rf .fase4-paket
          rm -f .github/workflows/terapkan-fase-4-sekali.yml
          rm -f .github/workflows/ekstrak-paket-fase-4.yml
          git checkout origin/main -- .github/workflows/fase-3-test.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          if git diff --cached --quiet; then
            echo 'Tidak ada perubahan implementasi untuk dikirim.' >&2
            exit 1
          fi

      - name: Commit implementasi Fase 4
        run: git commit -m "feat(fase4): implementasi persediaan dan mutasi stok"

      - name: Push hanya ke branch Fase 4
        run: git push origin HEAD:fase-4-persediaan
