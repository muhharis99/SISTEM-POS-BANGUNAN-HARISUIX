name: Fase 12 Pint Diagnostic

on:
  push:
    branches:
      - fase-12-final-release-go-live-hypercare
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fase-12-final-release-go-live-hypercare
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Apply and commit Laravel Pint
        run: |
          vendor/bin/pint
          if git diff --quiet; then
            echo 'Tidak ada perubahan format.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app tests
          git commit -m 'Format kode Fase 12 dengan Laravel Pint'
          git push origin HEAD:fase-12-final-release-go-live-hypercare
