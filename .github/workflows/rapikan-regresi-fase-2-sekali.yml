name: Rapikan Regresi Fase 2 Sekali

on:
  push:
    branches:
      - fase-2-autentikasi-organisasi-rbac
    paths:
      - '.github/workflows/rapikan-regresi-fase-2-sekali.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rapikan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch Fase 2
        uses: actions/checkout@v4
        with:
          ref: fase-2-autentikasi-organisasi-rbac
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Sesuaikan target browser setelah autentikasi aktif
        run: |
          python3 - <<'PY'
          from pathlib import Path

          targets = [
              Path('.github/workflows/investigasi-font-ubold.yml'),
              Path('.github/workflows/verifikasi-visual-font-nunito.yml'),
          ]

          for path in targets:
              text = path.read_text(encoding='utf-8')
              old = 'http://127.0.0.1:8000/dashboard'
              count = text.count(old)
              if count == 0:
                  raise SystemExit(f'Target dashboard tidak ditemukan pada {path}.')
              path.write_text(text.replace(old, 'http://127.0.0.1:8000/masuk'), encoding='utf-8')
              print(f'{path}: mengganti {count} target dashboard menjadi halaman masuk.')
          PY

      - name: Rapikan PHP dengan Pint
        run: vendor/bin/pint app bootstrap config database routes scripts tests

      - name: Commit hasil perbaikan ke branch Fase 2
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/investigasi-font-ubold.yml \
                  .github/workflows/verifikasi-visual-font-nunito.yml \
                  app bootstrap config database routes scripts tests

          if git diff --cached --quiet; then
            echo 'Tidak ada perubahan yang perlu di-commit.'
            exit 0
          fi

          git commit -m 'style(fase-2): rapikan kode dan sesuaikan regresi autentikasi'
          git push origin HEAD:fase-2-autentikasi-organisasi-rbac
