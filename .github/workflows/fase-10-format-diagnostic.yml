name: Fase 10 Format Diagnostic

on:
  push:
    branches:
      - fase-10-kesiapan-produksi-deployment
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql, zlib
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate Pint patch
        run: |
          vendor/bin/pint
          git diff --binary > pint-format.patch
          if [ ! -s pint-format.patch ]; then
            printf 'Tidak ada perubahan format.\n' > pint-format.patch
          fi

      - name: Upload Pint patch
        uses: actions/upload-artifact@v4
        with:
          name: fase-10-pint-format-patch
          path: pint-format.patch
          retention-days: 1
          if-no-files-found: error
