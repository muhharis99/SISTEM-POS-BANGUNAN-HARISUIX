name: Fase 3 Master Data Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: terapkan-fase-4-dari-workflow-aktif
  cancel-in-progress: true

jobs:
  terapkan-fase-4:
    if: github.event_name == 'pull_request' && github.head_ref == 'fase-4-persediaan'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch Fase 4
        uses: actions/checkout@v4
        with:
          ref: fase-4-persediaan
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none

      - name: Decode dan audit paket
        run: |
          set -euo pipefail
          cat .fase4-paket/part-* | base64 --decode > /tmp/fase4-package.tar.gz
          test -s /tmp/fase4-package.tar.gz
          gzip -t /tmp/fase4-package.tar.gz
          tar -tzf /tmp/fase4-package.tar.gz > /tmp/fase4-package-files.txt

          if grep -E '(^|/)\.\.(/|$)|^/' /tmp/fase4-package-files.txt; then
            echo 'Paket mengandung path absolut atau parent traversal.' >&2
            exit 1
          fi

          if grep -E '(^|/)(struktur_database_toko_bangunan\.sql|database/migrations/|vendor/|\.git/)' /tmp/fase4-package-files.txt; then
            echo 'Paket mencoba mengubah berkas yang dilarang.' >&2
            exit 1
          fi

      - name: Ekstrak paket dan periksa sintaks
        run: |
          set -euo pipefail
          tar -xzf /tmp/fase4-package.tar.gz -C .
          find app bootstrap config database routes scripts tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Siapkan commit bersih
        run: |
          set -euo pipefail
          rm -rf .fase4-paket
          rm -f .github/workflows/terapkan-fase-4-sekali.yml
          rm -f .github/workflows/ekstrak-paket-fase-4.yml
          git checkout origin/main -- .github/workflows/fase-3-test.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          test -n "$(git status --short)"

      - name: Commit implementasi Fase 4
        run: git commit -m "feat(fase4): implementasi persediaan dan mutasi stok"

      - name: Push hanya ke branch Fase 4
        run: git push origin HEAD:fase-4-persediaan
