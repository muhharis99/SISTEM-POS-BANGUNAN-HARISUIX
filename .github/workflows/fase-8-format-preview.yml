name: Fase 8 Apply Laravel Pint

on:
  push:
    branches:
      - fase-8-lampiran-audit
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-pint:
    if: ${{ !contains(github.event.head_commit.message, 'Terapkan Laravel Pint Fase 8') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fase-8-lampiran-audit
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Apply Laravel Pint
        run: vendor/bin/pint
      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            echo "Tidak ada perubahan format."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.php'
          git commit -m "Terapkan Laravel Pint Fase 8"
          git push origin HEAD:fase-8-lampiran-audit
