name: Fase 1 Smoke Test

on:
  push:
    branches:
      - fase-1-fondasi
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-fondasi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql
          coverage: none

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Upload resolved Composer lock
        uses: actions/upload-artifact@v4
        with:
          name: composer-lock
          path: composer.lock
          retention-days: 7
          if-no-files-found: error

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php scripts/salin-aset-template.php

      - name: Check PHP syntax
        run: find app bootstrap config database routes scripts tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Report PHP formatting
        continue-on-error: true
        run: vendor/bin/pint --test

      - name: Run tests without database migration
        run: php artisan test
