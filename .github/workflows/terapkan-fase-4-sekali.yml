name: Terapkan Kode Fase 4 Sekali

on:
  push:
    branches:
      - fase-4-persediaan
    paths:
      - '.github/workflows/terapkan-fase-4-sekali.yml'

permissions:
  contents: write

concurrency:
  group: terapkan-kode-fase-4-sekali
  cancel-in-progress: false

jobs:
  terapkan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch Fase 4
        uses: actions/checkout@v4
        with:
          ref: fase-4-persediaan
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none

      - name: Decode dan audit paket
        run: |
          set -euo pipefail
          cat .fase4-paket/part-* | base64 --decode > /tmp/fase4-package.tar.gz
          test -s /tmp/fase4-package.tar.gz
          gzip -t /tmp/fase4-package.tar.gz
          tar -tzf /tmp/fase4-package.tar.gz > /tmp/fase4-package-files.txt
          cat /tmp/fase4-package-files.txt

          if grep -E '(^|/)\.\.(/|$)|^/' /tmp/fase4-package-files.txt; then
            echo 'Paket mengandung path absolut atau parent traversal.' >&2
            exit 1
          fi

          if grep -E '(^|/)(struktur_database_toko_bangunan\.sql|database/migrations/|vendor/|\.git/)' /tmp/fase4-package-files.txt; then
            echo 'Paket mencoba mengubah berkas yang dilarang.' >&2
            exit 1
          fi

      - name: Ekstrak kode aplikasi tanpa file workflow
        run: |
          set -euo pipefail
          rm -rf /tmp/fase4-extracted
          mkdir -p /tmp/fase4-extracted
          tar -xzf /tmp/fase4-package.tar.gz -C /tmp/fase4-extracted
          rm -f /tmp/fase4-extracted/.github/workflows/fase-4-test.yml
          rsync -a /tmp/fase4-extracted/ ./

      - name: Periksa sintaks PHP
        run: find app bootstrap config database routes scripts tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Commit kode aplikasi dan hapus paket sementara
        run: |
          set -euo pipefail
          rm -rf .fase4-paket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!.github/workflows/**'
          git status --short
          if git diff --cached --quiet; then
            echo 'Tidak ada perubahan kode aplikasi hasil ekstraksi.' >&2
            exit 1
          fi
          git commit -m "feat(fase4): terapkan persediaan dan mutasi stok"
          git push origin HEAD:fase-4-persediaan
