name: Terapkan Fase 4 Sekali

on:
  push:
    branches:
      - fase-4-persediaan
    paths:
      - '.github/workflows/terapkan-fase-4-sekali.yml'
      - '.fase4-paket/**'

permissions:
  contents: write

jobs:
  terapkan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch Fase 4
        uses: actions/checkout@v4
        with:
          ref: fase-4-persediaan
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none

      - name: Verifikasi dan terapkan paket Fase 4
        run: |
          set -euo pipefail
          cat .fase4-paket/part-* | base64 --decode > /tmp/fase4-package.tar.gz
          echo "abc74480f8a8d60fb1084bf4453ad717bef18a98966a9b715acd0930532b2523  /tmp/fase4-package.tar.gz" | sha256sum -c -
          tar -xzf /tmp/fase4-package.tar.gz -C .
          find app bootstrap config database routes scripts tests -name '*.php' -print0 | xargs -0 -n1 php -l
          rm -rf .fase4-paket
          rm .github/workflows/terapkan-fase-4-sekali.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat(fase4): implementasi persediaan dan mutasi stok"
          git push origin HEAD:fase-4-persediaan
