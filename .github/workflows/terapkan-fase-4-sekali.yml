name: Terapkan Fase 4 Sekali

on:
  push:
    branches:
      - fase-4-persediaan
    paths:
      - '.github/workflows/terapkan-fase-4-sekali.yml'
      - '.fase4-paket/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/terapkan-fase-4-sekali.yml'
      - '.fase4-paket/**'

permissions:
  contents: write

concurrency:
  group: terapkan-fase-4-sekali
  cancel-in-progress: false

jobs:
  terapkan:
    if: github.event_name == 'push' || github.head_ref == 'fase-4-persediaan'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch Fase 4
        uses: actions/checkout@v4
        with:
          ref: fase-4-persediaan
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none

      - name: Verifikasi dan terapkan paket Fase 4
        run: |
          set -euo pipefail

          cat .fase4-paket/part-* | base64 --decode > /tmp/fase4-package.tar.gz
          test -s /tmp/fase4-package.tar.gz
          gzip -t /tmp/fase4-package.tar.gz
          tar -tzf /tmp/fase4-package.tar.gz > /tmp/fase4-package-files.txt

          if grep -E '(^|/)\.\.?(/|$)|^/' /tmp/fase4-package-files.txt; then
            echo 'Paket mengandung path yang tidak aman.' >&2
            exit 1
          fi

          if grep -E '(^|/)(struktur_database_toko_bangunan\.sql|database/migrations/|vendor/|\.git/)' /tmp/fase4-package-files.txt; then
            echo 'Paket mencoba mengubah berkas yang dilarang.' >&2
            exit 1
          fi

          tar -xzf /tmp/fase4-package.tar.gz -C .
          find app bootstrap config database routes scripts tests -name '*.php' -print0 | xargs -0 -n1 php -l

          rm -rf .fase4-paket
          rm .github/workflows/terapkan-fase-4-sekali.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo 'Tidak ada perubahan hasil ekstraksi.' >&2
            exit 1
          fi

          git commit -m "feat(fase4): implementasi persediaan dan mutasi stok"
          git push origin HEAD:fase-4-persediaan
