<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Two Factor Authentication | UBold - Multipurpose Admin & Dashboard Template</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="UBold is a modern, responsive admin dashboard available on ThemeForest. Ideal for building CRM, CMS, project management tools, and custom web applications with a clean UI, flexible layouts, and rich features." />
        <meta name="keywords" content="UBold, admin dashboard, ThemeForest, Bootstrap 5 admin, Tailwind CSS, responsive admin, CRM dashboard, CMS admin, web app UI, admin theme, premium admin template" />
        <meta name="author" content="Coderthemes" />

        <!-- App favicon -->
        <link rel="shortcut icon" href="assets/images/favicon.ico" />
 <!-- Theme Config Js -->
<script src="assets/js/config-html.js"></script>

<!-- Theme Config Js -->
<script src="assets/js/config.js"></script>

<!-- Vendor css -->
<link href="assets/css/vendors.min.css" rel="stylesheet" type="text/css" />

<!-- App css -->
<link id="app-style" href="assets/css/app.min.css" rel="stylesheet" type="text/css" />

    </head>

    <body>
        <div class="auth-box p-0 w-100">
            <div class="row w-100 g-0">
                <div class="col-md-auto">
                    <!--Auth Box content -->
                    <div class="card auth-box-form border-0 mb-0">
                        <div class="position-absolute top-0 end-0" style="width: 180px">
                            <img src="assets/images/auth-card-bg.svg" class="auth-card-bg-img" alt="auth-card-bg" />
                        </div>
                        <div class="card-body min-vh-100 position-relative d-flex flex-column justify-content-center">
                            <div class="auth-brand mb-0 text-center">
                                <a href="index.html" class="logo-dark">
                                    <img src="assets/images/logo-black.png" alt="dark logo" />
                                </a>
                                <a href="index.html" class="logo-light">
                                    <img src="assets/images/logo.png" alt="logo" />
                                </a>
                            </div>

                            <div class="mt-auto">
                                <p class="text-muted text-center auth-sub-text mx-auto">We've emailed you a 6-digit verification code we sent to</p>

                                <div class="text-center mb-4">
                                    <div class="fw-bold fs-3">******6789</div>
                                </div>

                                <form class="mt-4">
                                    <div class="mb-3">
                                        <label class="form-label d-flex">
                                            Enter your 6-digit code
                                            <span class="text-danger">*</span>
                                        </label>
                                        <div class="d-flex gap-2 two-factor">
                                            <input type="text" class="form-control text-center" required />
                                            <input type="text" class="form-control text-center" required />
                                            <input type="text" class="form-control text-center" required />
                                            <input type="text" class="form-control text-center" required />
                                            <input type="text" class="form-control text-center" required />
                                            <input type="text" class="form-control text-center" required />
                                        </div>
                                    </div>

                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary fw-semibold py-2">Confirm</button>
                                    </div>
                                </form>
                            </div>

                            <p class="text-muted text-center mt-4 mb-0">
                                Don’t have a code?
                                <a href="#" class="text-decoration-underline link-offset-2 fw-semibold">Resend</a>
                                or
                                <a href="#" class="text-decoration-underline link-offset-2 fw-semibold">Call Us</a>
                            </p>

                            <p class="text-muted text-center mt-4 mb-0">
                                Return to
                                <a href="auth-split-sign-in.html" class="text-decoration-underline link-offset-3 fw-semibold">Sign in</a>
                            </p>

                            <p class="text-center text-muted mt-auto mb-0">
                                ©
                                <span data-current-year></span>
                                UBold — by
                                <span class="fw-bold">Coderthemes</span>
                            </p>
                        </div>
                    </div>
                    <!-- End Auth Box Content -->
                </div>
                <div class="col">
                    <div class="h-100 position-relative card-side-img rounded-0 overflow-hidden" style="background-image: url(assets/images/auth.jpg)">
                        <div class="p-4 card-img-overlay auth-overlay d-flex align-items-end justify-content-center"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vendor js -->
        <script src="assets/js/vendors.min.js"></script>

        <!-- App js -->
        <script src="assets/js/app.js"></script>


        <!-- Two Factor Validator Js -->
        <script src="assets/js/pages/auth-two-factor.js"></script>

        <!-- Password Suggestion Js -->
        <script src="assets/js/pages/auth-password.js"></script>
    </body>
</html>
