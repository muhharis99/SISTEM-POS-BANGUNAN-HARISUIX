<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />

        <meta name="description" content="UBold is a modern, responsive admin dashboard available on ThemeForest. Ideal for building CRM, CMS, project management tools, and custom web applications with a clean UI, flexible layouts, and rich features." />
        <meta name="keywords" content="UBold, admin dashboard, ThemeForest, Bootstrap 5 admin, Tailwind CSS, responsive admin, CRM dashboard, CMS admin, web app UI, admin theme, premium admin template" />

        <!-- App favicon -->
        <link rel="shortcut icon" href="assets/images/favicon.ico" />
 <!-- Theme Config Js -->
<script src="assets/js/config-html.js"></script>

<!-- Vendor css -->
<link href="assets/css/vendors.min.css" rel="stylesheet" type="text/css" />

<!-- App css -->
<link id="app-style" href="assets/css/app.min.css" rel="stylesheet" type="text/css" />

    </head>

    <body>
        <div class="auth-box p-0 w-100">
            <div class="row w-100 g-0">
                <div class="col-md-auto">
                    <!--Auth Box content -->
                    <div class="card auth-box-form border-0 mb-0">
                        <div class="position-absolute top-0 end-0" style="width: 180px">
                            <img src="assets/images/auth-card-bg.svg" class="auth-card-bg-img" alt="auth-card-bg" />
                        </div>
                        <div class="card-body min-vh-100 position-relative d-flex flex-column justify-content-center">
                            <div class="auth-brand mb-0 text-center">
                                <a href="index.html" class="logo-dark">
                                    <img src="assets/images/logo-black.png" alt="dark logo" />
                                </a>
                                <a href="index.html" class="logo-light">
                                    <img src="assets/images/logo.png" alt="logo" />
                                </a>
                            </div>

                            <div class="mt-auto">
                                <form class="mt-4">
                                    <div class="mb-4">
                                        <div class="avatar-xxl mx-auto mt-2">
                                            <div class="avatar-title bg-light-subtle border border-light border-dashed rounded-circle">
                                                <img src="assets/images/delete.png" alt="dark logo" height="64" />
                                            </div>
                                        </div>
                                    </div>

                                    <h4 class="fw-bold text-center mb-3">Account Deactivated</h4>
                                    <p class="text-muted text-center mb-4">Your account is currently inactive. Reactivate now to regain access to all features and opportunities.</p>

                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary fw-semibold py-2">Reactivate Now</button>
                                    </div>
                                </form>
                            </div>

                            <p class="text-center text-muted mt-auto mb-0">
                                ©
                                <span data-current-year></span>
                                UBold — by
                                <span class="fw-bold">Coderthemes</span>
                            </p>

                    </div>
                    <!-- End Auth Box Content -->
                </div>
                <div class="col">
                    <div class="h-100 position-relative card-side-img rounded-0 overflow-hidden" style="background-image: url(assets/images/auth.jpg)">
                        <div class="p-4 card-img-overlay auth-overlay d-flex align-items-end justify-content-center"></div>
                    </div>
                </div>
            </div>
